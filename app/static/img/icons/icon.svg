<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="url(#grad1)"/>

  <!-- 笔记纸张 -->
  <rect x="120" y="100" width="272" height="320" rx="16" ry="16" fill="white" opacity="0.95"/>

  <!-- 笔记线条 -->
  <line x1="160" y1="160" x2="352" y2="160" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="210" x2="352" y2="210" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="260" x2="320" y2="260" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="310" x2="280" y2="310" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>

  <!-- 流光效果 -->
  <path d="M380 140 Q420 180 380 260 Q340 340 400 380" stroke="#34D399" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.8"/>
  <circle cx="400" cy="380" r="12" fill="#34D399" opacity="0.6"/>
